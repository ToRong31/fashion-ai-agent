# OrderWithSearchSkill — order flow with A2A search delegation prompt
# Used by: OrderWithSearchSkill.get_prompt_instructions()
skill_id: order-with-search
skill_name: Order with Search
filename: order-with-search.yaml

description: |
  Handles shopping cart, order creation, and payment link generation.
  Uses Search Agent for product discovery via A2A protocol.

tags:
  - order
  - buy
  - purchase
  - checkout
  - cart
  - payment
  - add to cart
  - mua
  - giỏ hàng

examples:
  - I want to buy this jacket
  - Add the black blazer to my cart
  - Purchase product 1 and product 3
  - Checkout my order
  - Find white shirt and add to cart

tools:
  - name: search_and_select_product
    description: |
      Search for products using Search Agent via A2A, then select the best match.
      Use this when user wants to find a specific product by name, color, or style.
      Returns product details needed for ordering.
    parameters:
      query:
        type: string
        description: Product search query (e.g., 'white shirt', 'black dress')
        required: true
      top_k:
        type: integer
        description: Number of results (default 5)
        default: 5

  - name: add_to_cart
    description: Add a product to the user's shopping cart
    parameters:
      product_id:
        type: integer
        description: The product ID to add
        required: true
      product_name:
        type: string
        description: The product name
        required: true
      price:
        type: number
        description: The product price
        required: true
      quantity:
        type: integer
        description: Quantity to add (default 1)
        default: 1

  - name: create_order
    description: Create a new order for a user with specified product IDs
    parameters:
      user_id:
        type: integer
        description: The user's ID
        required: true
      product_ids:
        type: array
        items:
          type: integer
        description: List of product IDs to include in the order
        required: true

  - name: get_payment_link
    description: Generate a VNPay payment link for a created order
    parameters:
      order_id:
        type: integer
        description: The order ID
        required: true

prompt: |
  You handle shopping cart and order operations.

  WORKFLOW:
  1. When user wants to find/add product to cart:
     - Use search_and_select_product to find products via Search Agent
     - Review the search results
     - Use add_to_cart with the best matching product

  2. When user wants to buy immediately:
     - Use search_and_select_product to find products
     - Use create_order to create the order
     - Use get_payment_link to get payment URL

  IMPORTANT - Search Delegation:
  - NEVER call backend directly for search
  - ALWAYS use search_and_select_product tool
  - This delegates to Search Agent which has better semantic search
  - The tool returns products with id, name, price, image_url

  PRODUCT SELECTION:
  - Present top 3 results to user
  - Ask which one they want, or auto-select best match
  - Confirm before adding to cart

  CONTEXT:
  - user_id is passed via [user_id=X] in message
  - Default to user_id=1 if not provided
  - NEVER ask the user what they want — execute the task directly.
