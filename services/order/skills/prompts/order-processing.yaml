# OrderProcessingSkill — cart & order management prompt
# Used by: OrderProcessingSkill.get_prompt_instructions()
skill_id: order-processing
skill_name: Order Processing
filename: order-processing.yaml

description: |
  Handles shopping cart, order creation, and payment link generation.
  Supports adding items to cart, placing orders, and VNPay checkout.

tags:
  - order
  - buy
  - purchase
  - checkout
  - cart
  - payment
  - add to cart
  - mua
  - giỏ hàng

examples:
  - I want to buy this jacket
  - Add the black blazer to my cart
  - Purchase product 1 and product 3
  - Checkout my order

tools:
  - name: search_products
    description: Search for clothing products to find their IDs and details before ordering
    parameters:
      query:
        type: string
        description: Product search query, e.g. 'black jeans', 'casual sneakers'
        required: true

  - name: add_to_cart
    description: Add a single product to the user's shopping cart
    parameters:
      product_id:
        type: integer
        description: The product ID to add
        required: true
      product_name:
        type: string
        description: The product name
        required: true
      price:
        type: number
        description: The product price
        required: true
      quantity:
        type: integer
        description: Quantity to add (default 1)
        default: 1

  - name: add_multiple_to_cart
    description: |
      Add multiple products to the user's shopping cart at once.
      Use this when user wants to add all or multiple products.
    parameters:
      products:
        type: array
        description: List of products to add to cart
        required: true
        items:
          properties:
            product_id:
              type: integer
              description: The product ID
            product_name:
              type: string
              description: The product name
            price:
              type: number
              description: The product price
            quantity:
              type: integer
              description: Quantity (default 1)
              default: 1

  - name: create_order
    description: Create a new order for a user with specified product IDs
    parameters:
      user_id:
        type: integer
        description: The user's ID
        required: true
      product_ids:
        type: array
        items:
          type: integer
        description: List of product IDs to include in the order
        required: true

  - name: get_payment_link
    description: Generate a VNPay payment link for a created order
    parameters:
      order_id:
        type: integer
        description: The order ID
        required: true

prompt: |
  You handle shopping cart and order operations.

  When a user wants to ADD TO CART (single item):
  1. Call add_to_cart with product_id, product_name, and price.
  2. Extract user_id from [user_id=X] in the message - this is REQUIRED.
  3. Confirm what was added to the cart.

  When a user wants to ADD ALL or MULTIPLE items to cart:
  1. Call add_multiple_to_cart with a list of products.
  2. Each product should have: product_id, product_name, price.
  3. Extract user_id from [user_id=X] in the message - this is REQUIRED.
  4. Confirm how many items were added.

  IMPORTANT: When user says 'add all', 'add them all', 'add everything', or provides multiple products,
  you MUST use add_multiple_to_cart tool - NOT add_to_cart.

  When a user wants to BUY/ORDER/CHECKOUT:
  1. Call create_order with the user's ID and the found product IDs.
  2. Call get_payment_link to generate the VNPay payment link.
  3. Present the order summary and payment link.

  CRITICAL: user_id extraction rules:
  - Always extract user_id from [user_id=X] in the task message
  - Example: 'Add to cart [user_id=5]' → use user_id=5
  - The user_id is REQUIRED for all cart operations

  NEVER ask the user what they want — execute the task directly.
