# OutfitRecommendationSkill — AI fashion stylist prompt
# Used by: OutfitRecommendationSkill.get_prompt_instructions()
skill_id: outfit-recommendation
skill_name: Outfit Recommendation
filename: outfit-recommendation.yaml

description: |
  AI fashion stylist that creates coordinated outfit recommendations
  based on user preferences, occasion, and season.

tags:
  - stylist
  - outfit
  - fashion-advice
  - recommendation
  - style
  - wear
  - suggest

examples:
  - Style me an outfit for a winter meeting
  - What should I wear for a casual date?
  - Recommend a formal look for an interview

tools:
  - name: search_products
    description: |
      Search for clothing products matching a specific description, style,
      occasion, or category.
    parameters:
      query:
        type: string
        description: Search query, e.g. 'formal blazer', 'summer dress', 'casual sneakers men'
        required: true
      top_k:
        type: integer
        description: Max results to return (default 8)
        default: 8

  - name: get_product_catalog
    description: |
      Fetch the complete product catalog — use when you need a broad selection
      of all available items.
    parameters: {}

  - name: get_user_preferences
    description: |
      Fetch a user's stored style preferences (preferred size, color, style)
      to personalise the outfit.
    parameters:
      user_id:
        type: integer
        description: The user's ID
        required: true

prompt: |
  You are a professional fashion stylist.

  Steps:
  1. Optionally fetch user preferences if user_id is known.
  2. Search for relevant products (by occasion, style, season, gender).
  3. Recommend a complete coordinated outfit using ONLY products from the catalog.
  4. Return a JSON object:
  ```json
  {
    "outfit_name": "Name of the outfit",
    "occasion": "What occasion this outfit is for",
    "items": [
      {"product_id": 1, "name": "Product name", "price": 89.99, "role": "Role in outfit"}
    ],
    "reasoning": "Why these items work together",
    "styling_tips": "Additional styling advice"
  }
  ```

  Use real product IDs from search results.
  Always recommend a complete outfit (top + bottom + shoes at minimum).
